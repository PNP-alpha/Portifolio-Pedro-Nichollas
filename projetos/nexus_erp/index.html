<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus ERP | Acesso Corporativo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #0f172a; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden;
        }
        .font-tech { font-family: 'Orbitron', sans-serif; }
        
        /* Efeito de Vidro (Glassmorphism) */
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        /* Animação de Fundo */
        .bg-grid {
            background-image: linear-gradient(to right, #1e293b 1px, transparent 1px),
                              linear-gradient(to bottom, #1e293b 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center relative">
    
    <div class="absolute inset-0 bg-grid z-0 opacity-40"></div>
    <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-b from-transparent to-[#0f172a] z-0"></div>

    <div class="relative z-10 w-full max-w-md p-8 glass-panel rounded-2xl animate-fade-in-up">
        
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-600/20 text-blue-400 mb-4 ring-1 ring-blue-500/50 shadow-[0_0_15px_rgba(59,130,246,0.5)]">
                <i class="fa-solid fa-cube text-2xl"></i>
            </div>
            <h1 class="text-3xl text-white font-bold font-tech tracking-wider">NEXUS ERP</h1>
            <p class="text-slate-400 text-xs uppercase tracking-widest mt-2">Supply Chain Management v1.0</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-slate-400 text-xs font-bold mb-2 uppercase tracking-wide">Corporate ID (Email)</label>
                <div class="relative group">
                    <i class="fa-solid fa-user absolute left-3 top-3.5 text-slate-500 group-focus-within:text-blue-400 transition"></i>
                    <input type="email" id="email" 
                        class="w-full bg-slate-800/50 border border-slate-700 text-white rounded-lg py-3 pl-10 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition" 
                        placeholder="admin@nexus.com" value="admin@nexus.com">
                </div>
            </div>
            
            <div>
                <label class="block text-slate-400 text-xs font-bold mb-2 uppercase tracking-wide">Security Key (Senha)</label>
                <div class="relative group">
                    <i class="fa-solid fa-lock absolute left-3 top-3.5 text-slate-500 group-focus-within:text-blue-400 transition"></i>
                    <input type="password" id="password" 
                        class="w-full bg-slate-800/50 border border-slate-700 text-white rounded-lg py-3 pl-10 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition" 
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-lg transition-all duration-300 shadow-lg shadow-blue-900/30 flex justify-center items-center gap-2 group">
                <span id="btnText">INICIAR SESSÃO</span>
                <i id="btnIcon" class="fa-solid fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-700/50 text-center">
            <a href="../../index.html" class="text-slate-500 hover:text-white text-xs transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> Voltar ao Portfólio
            </a>
        </div>
        
        <div id="statusMsg" class="hidden mt-4 p-3 text-center text-sm rounded border"></div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
