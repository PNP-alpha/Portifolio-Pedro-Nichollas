<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currículo | Pedro Nichollas</title>
    
    <link rel="stylesheet" href="cv.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <button class="btn-print" onclick="window.print()">
        <i class="fa-solid fa-print"></i> Salvar PDF / Imprimir
    </button>

    <div class="page">
        
        <header class="cv-header">
            <h1 id="cv-name">Carregando...</h1>
            <h2 id="cv-title"></h2>
            
            <div class="contact-info" id="cv-contact">
                </div>
        </header>

        <section class="cv-section">
            <h3 class="section-title">Resumo Profissional</h3>
            <p id="cv-summary" class="summary-text"></p>
        </section>

        <div class="cv-grid">
            
            <div class="main-column">
                
                <section class="cv-section">
                    <h3 class="section-title">Experiência Profissional</h3>
                    <div id="cv-experience">
                        </div>
                </section>

                <section class="cv-section">
                    <h3 class="section-title">Projetos em Destaque</h3>
                    <div id="cv-projects">
                        </div>
                </section>
            </div>

            <div class="side-column">
                
                <section class="cv-section">
                    <h3 class="section-title">Formação Acadêmica</h3>
                    <div id="cv-education">
                        </div>
                </section>

                <section class="cv-section">
                    <h3 class="section-title">Certificações</h3>
                    <div id="cv-certs">
                        </div>
                </section>
            </div>
        </div>
    </div>

    <script>
        async function loadCV() {
            try {
                // 1. Busca o arquivo JSON raiz
                const response = await fetch('dados.json');
                const data = await response.json();

                // 2. Preenche o Perfil
                document.getElementById('cv-name').textContent = data.perfil.nome;
                document.getElementById('cv-title').textContent = data.perfil.titulo;
                document.getElementById('cv-summary').textContent = data.perfil.subtitulo;

                // 3. Preenche Contatos (Formatando os links para leitura em papel)
                const contatosHtml = `
                    <span><i class="fa-solid fa-envelope"></i> ${data.contato.email}</span>
                    <span><i class="fa-brands fa-whatsapp"></i> ${data.contato.whatsapp.replace('https://wa.me/', '+')}</span>
                    <span><i class="fa-brands fa-linkedin"></i> linkedin.com/in/pedro-nichollas</span>
                    <span><i class="fa-brands fa-github"></i> github.com/PNP-alpha</span>
                    <span><i class="fa-solid fa-location-dot"></i> Monte Sião, MG</span>
                `;
                document.getElementById('cv-contact').innerHTML = contatosHtml;

                // 4. Preenche Experiência Profissional
                const expHtml = data.carreira.map(item => `
                    <div class="item-block">
                        <div class="item-header">
                            <h4 class="item-title">${item.cargo}</h4>
                            <span class="item-date">${item.periodo}</span>
                        </div>
                        <div class="item-subtitle">${item.empresa}</div>
                        <p class="item-desc">${item.detalhes}</p>
                    </div>
                `).join('');
                document.getElementById('cv-experience').innerHTML = expHtml;

                // 5. Preenche Projetos (Limitado aos 3 primeiros para não vazar a folha A4)
                const projHtml = data.projetos.slice(0, 3).map(item => `
                    <div class="item-block">
                        <h4 class="item-title">${item.titulo}</h4>
                        <p class="item-desc">${item.descricao}</p>
                    </div>
                `).join('');
                document.getElementById('cv-projects').innerHTML = projHtml;

                // 6. Preenche Formação Acadêmica
                const eduHtml = data.formacao.map(item => `
                    <div class="item-block">
                        <h4 class="item-title">${item.curso}</h4>
                        <div class="item-subtitle">${item.instituicao}</div>
                        <span class="item-date">${item.periodo}</span>
                    </div>
                `).join('');
                document.getElementById('cv-education').innerHTML = eduHtml;

                // 7. Preenche Certificações
                const certsHtml = data.certificados.map(item => `
                    <div class="item-block small-margin">
                        <h4 class="item-title text-sm"><i class="fa-solid fa-certificate"></i> ${item.titulo}</h4>
                    </div>
                `).join('');
                document.getElementById('cv-certs').innerHTML = certsHtml;

                // ==========================================
                // TRUQUE DO AUTO-PRINT (Download Automático)
                // ==========================================
                // Verifica se o usuário chegou aqui através do botão "Baixar CV" do portfólio
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('action') === 'print') {
                    // Espera meio segundo (500ms) para garantir que as fontes do Google e o layout renderizaram
                    setTimeout(() => {
                        window.print();
                    }, 500);
                }

            } catch (error) {
                console.error("Erro ao carregar os dados para o currículo:", error);
                document.getElementById('cv-name').textContent = "Erro de Sincronização de Dados";
            }
        }

        // Executa a função principal assim que a página é aberta
        loadCV();
    </script>
</body>
</html>
