<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cyber Snake | PNP Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f3ff; --bg: #050505; --grid: #111; }
        body { 
            margin: 0; background: var(--bg); height: 100vh; overflow: hidden;
            font-family: 'Orbitron', sans-serif; color: var(--neon);
            display: flex; justify-content: center; align-items: center;
        }

        /* Menu */
        #menu-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        h1 { font-size: 4rem; text-shadow: 0 0 20px var(--neon); }
        .btn {
            background: transparent; border: 2px solid var(--neon); color: var(--neon);
            padding: 15px 40px; font-size: 1.5rem; margin: 10px; cursor: pointer;
            font-family: 'Orbitron'; transition: 0.3s; width: 300px;
        }
        .btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }

        /* Game Board */
        #game-board {
            width: 80vmin; height: 80vmin; /* Quadrado responsivo */
            background: var(--grid); border: 4px solid var(--neon);
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.2);
            display: grid; grid-template-rows: repeat(20, 1fr); grid-template-columns: repeat(20, 1fr);
        }
        
        .snake { background-color: var(--neon); border: 1px solid #000; box-shadow: 0 0 10px var(--neon); }
        .food { background-color: #ff00ff; border-radius: 50%; box-shadow: 0 0 15px #ff00ff; animation: pulse 1s infinite; }
        
        @keyframes pulse { 0% { transform: scale(0.8); } 50% { transform: scale(1.1); } 100% { transform: scale(0.8); } }

        .score-panel { position: absolute; top: 20px; font-size: 2rem; }
        .back-btn { 
            position: absolute; top: 20px; left: 20px; color: var(--neon); 
            text-decoration: none; border: 1px solid var(--neon); padding: 10px 20px;
            font-weight: bold; transition: 0.3s;
        }
        .back-btn:hover { background: var(--neon); color: #000; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-btn">SAIR</a>
    <div class="score-panel">SCORE: <span id="score">0</span></div>
    
    <div id="game-board"></div>

    <div id="menu-screen">
        <h1>CYBER SNAKE</h1>
        <button class="btn" onclick="startGame(150)">SLUG (EASY)</button>
        <button class="btn" onclick="startGame(100)">PYTHON (MED)</button>
        <button class="btn" onclick="startGame(60)">VIPER (HARD)</button>
    </div>

    <script>
        const board = document.getElementById('game-board');
        const scoreElement = document.getElementById('score');
        const boardSize = 20;
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 0; let dy = 0;
        let score = 0;
        let gameSpeed = 100;
        let lastRenderTime = 0;
        let gameRunning = false;

        function main(currentTime) {
            if(!gameRunning) return;
            window.requestAnimationFrame(main);
            const secondsSinceLastRender = (currentTime - lastRenderTime) / 1000;
            if (secondsSinceLastRender < 1 / (1000 / gameSpeed)) return;
            lastRenderTime = currentTime;
            update(); draw();
        }

        function update() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // Colisão Paredes
            if(head.x < 1 || head.x > boardSize || head.y < 1 || head.y > boardSize) return gameOver();
            
            // Colisão Corpo
            for(let i = 1; i < snake.length; i++) {
                if(head.x === snake[i].x && head.y === snake[i].y) return gameOver();
            }

            snake.unshift(head); // Move cabeça

            if(head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                placeFood();
                if(gameSpeed > 40) gameSpeed -= 1; // Acelera
            } else {
                snake.pop(); // Remove cauda
            }
        }

        function draw() {
            board.innerHTML = '';
            snake.forEach(segment => {
                const el = document.createElement('div');
                el.style.gridRowStart = segment.y;
                el.style.gridColumnStart = segment.x;
                el.classList.add('snake');
                board.appendChild(el);
            });
            const foodEl = document.createElement('div');
            foodEl.style.gridRowStart = food.y;
            foodEl.style.gridColumnStart = food.x;
            foodEl.classList.add('food');
            board.appendChild(foodEl);
        }

        function placeFood() {
            food = { x: Math.floor(Math.random() * boardSize) + 1, y: Math.floor(Math.random() * boardSize) + 1 };
            // Não spawnar na cobra
            snake.forEach(segment => { if (segment.x === food.x && segment.y === food.y) placeFood(); });
        }

        function gameOver() {
            gameRunning = false;
            alert("GAME OVER! Score: " + score);
            document.getElementById('menu-screen').style.display = 'flex';
            snake = [{x: 10, y: 10}]; dx = 0; dy = 0; score = 0;
            scoreElement.innerText = 0;
        }

        function startGame(speed) {
            gameSpeed = speed;
            document.getElementById('menu-screen').style.display = 'none';
            gameRunning = true;
            window.requestAnimationFrame(main);
        }

        window.addEventListener('keydown', e => {
            switch (e.key) {
                case 'ArrowUp': if(dy !== 1) { dx = 0; dy = -1; } break;
                case 'ArrowDown': if(dy !== -1) { dx = 0; dy = 1; } break;
                case 'ArrowLeft': if(dx !== 1) { dx = -1; dy = 0; } break;
                case 'ArrowRight': if(dx !== -1) { dx = 1; dy = 0; } break;
            }
        });
    </script>
</body>
</html>
