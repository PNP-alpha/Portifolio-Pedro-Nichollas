<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Neon Tetris | PNP Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f3ff; --bg: #050505; --grid-bg: #111; }
        body { 
            margin: 0; background: var(--bg); height: 100vh; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Orbitron', sans-serif; color: var(--neon);
        }

        /* ++++++++++++++++================== MENU INICIAL ======================+++++++++++++++ */
        #menu-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        h1 { font-size: 4rem; text-shadow: 0 0 20px var(--neon); margin-bottom: 50px; }
        .btn-difficulty {
            background: transparent; border: 2px solid var(--neon); color: var(--neon);
            padding: 15px 40px; font-size: 1.5rem; margin: 10px; cursor: pointer;
            font-family: 'Orbitron'; transition: 0.3s; width: 300px;
        }
        .btn-difficulty:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }

        /* ++++++++++++++++================== ÁREA DE JOGO ======================+++++++++++++++ */
        #game-container {
            position: relative; border: 4px solid var(--neon); padding: 5px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
        }
        canvas { display: block; background: var(--grid-bg); }
        
        .ui-panel {
            position: absolute; right: -200px; top: 0; width: 180px;
            text-align: left;
        }
        .score-label { font-size: 0.8rem; color: #666; }
        .score-val { font-size: 2rem; margin-bottom: 20px; }
        
        .controls-hint {
            position: absolute; bottom: 20px; left: 20px; color: #444; font-size: 0.8rem;
        }
        .back-btn { 
            position: absolute; top: 20px; left: 20px; color: var(--neon); 
            text-decoration: none; border: 1px solid var(--neon); padding: 10px 20px;
            font-weight: bold; transition: 0.3s; z-index: 20;
        }
        .back-btn:hover { background: var(--neon); color: #000; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-btn">SAIR</a>

    <div id="menu-screen">
        <h1>NEON TETRIS</h1>
        <button class="btn-difficulty" onclick="startGame(1000)">NORMAL</button>
        <button class="btn-difficulty" onclick="startGame(500)">HARD</button>
        <button class="btn-difficulty" onclick="startGame(100)">INSANE</button>
    </div>

    <div id="game-container">
        <canvas id="tetris" width="300" height="600"></canvas>
        <div class="ui-panel">
            <div class="score-label">SCORE</div>
            <div class="score-val" id="score">0</div>
            <div class="score-label">LEVEL</div>
            <div class="score-val" id="level">1</div>
        </div>
    </div>

    <div class="controls-hint">
        [A] ESQUERDA | [D] DIREITA | [S] DESCER | [SPACE] GIRAR
    </div>

    <script>
        // ++++++++++++++++================== ENGINE TETRIS ======================+++++++++++++++
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        
        context.scale(30, 30); // Escala para os blocos

        // Peças (Tetrominós)
        const pieces = 'ILJOTSZ';
        const colors = [
            null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'
        ];

        function createPiece(type) {
            if (type === 'I') return [[0, 1, 0, 0],[0, 1, 0, 0],[0, 1, 0, 0],[0, 1, 0, 0]];
            if (type === 'L') return [[0, 2, 0],[0, 2, 0],[0, 2, 2]];
            if (type === 'J') return [[0, 3, 0],[0, 3, 0],[3, 3, 0]];
            if (type === 'O') return [[4, 4],[4, 4]];
            if (type === 'Z') return [[5, 5, 0],[0, 5, 5],[0, 0, 0]];
            if (type === 'S') return [[0, 6, 6],[6, 6, 0],[0, 0, 0]];
            if (type === 'T') return [[0, 7, 0],[7, 7, 7],[0, 0, 0]];
        }

        const arena = createMatrix(10, 20);
        
        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0,
        };

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function draw() {
            // Limpa tela
            context.fillStyle = '#111';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        // Efeito de brilho nas bordas do bloco
                        context.lineWidth = 0.05;
                        context.strokeStyle = 'white';
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerMove(offset) {
            player.pos.x += offset;
            if (collide(arena, player)) {
                player.pos.x -= offset;
            }
        }

        function playerReset() {
            const piecesStr = 'ILJOTSZ';
            player.matrix = createPiece(piecesStr[piecesStr.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            if (collide(arena, player)) {
                // Game Over
                arena.forEach(row => row.fill(0));
                player.score = 0;
                updateScore();
                document.getElementById('menu-screen').style.display = 'flex';
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
            }
        }

        function updateScore() {
            scoreElement.innerText = player.score;
        }

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
            draw();
            requestAnimationFrame(update);
        }

        // ++++++++++++++++================== CONTROLES ======================+++++++++++++++
        document.addEventListener('keydown', event => {
            if (document.getElementById('menu-screen').style.display !== 'none') return;
            
            if (event.keyCode === 65) playerMove(-1); // A (Left)
            else if (event.keyCode === 68) playerMove(1);  // D (Right)
            else if (event.keyCode === 83) playerDrop();   // S (Down)
            else if (event.keyCode === 32) playerRotate(1);// Space (Rotate)
        });

        // ++++++++++++++++================== GAME START ======================+++++++++++++++
        function startGame(speed) {
            dropInterval = speed;
            document.getElementById('menu-screen').style.display = 'none';
            playerReset();
            update();
        }
    </script>
</body>
</html>
